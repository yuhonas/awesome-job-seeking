name: Check Markdown links

on: push

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - name: Install markdown-link-check
      run: npm install -g markdown-link-check
    - name: Check Markdown links
      run: markdown-link-check README.md
